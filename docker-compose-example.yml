version: "3.9"
services:
  postgres:
    # postgres:18+ images mount the volume at /var/lib/postgresql (not
    # .../data); the cluster lives in <volume>/18/docker.  A volume
    # initialized by an older major version cannot be reused -- reset
    # with `docker compose down -v`.
    image: 'docker.io/postgres:18.3-alpine'
    volumes:
      - 'pgdata:/var/lib/postgresql'      # Use a docker volume for the database files
     #- './pgdata:/var/lib/postgresql:Z'  # to keep the volume in your local dir
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'

  malan:
    image: 'docker.io/freedomben/malan:latest'
    ports:
      - "4000:4000"
    environment:
      DB_INIT: 'Yes'
      DB_USERNAME: 'postgres'
      DB_PASSWORD: 'postgres'
      DB_HOSTNAME: 'postgres'
      BIND_ADDR: '0.0.0.0'
      LOG_LEVEL: 'debug'
    depends_on:
      - 'postgres'

volumes:
  pgdata:

