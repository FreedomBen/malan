version: "3"
services:
  postgres:
    image: 'postgres:12.6-alpine'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'      # Use a docker volume for the database files
     #- './pgdata:/var/lib/postgresql/data:Z'  # to keep the volume in your local dir
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'

  redis:
    image: 'redis:7.4-alpine'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - 'redisdata:/data'

  malan:
    build: .
    ports:
      - "4000:4000"
    environment:
      HOST: 'localhost'
      PORT: '4000'
      BIND_ADDR: '0.0.0.0'
      MAILGUN_DISABLE: 'Yes'
      # Default to 'No' so this file is safe to copy as a starting point
      # for non-dev environments. With DB_INIT unset (or 'No'),
      # scripts/start-in-docker.sh skips `mix ecto.setup` and the seed
      # script (priv/repo/seeds.exs) does NOT create the `root` admin
      # with its committed default password.
      # For first-time local dev, override on the command line:
      #   DB_INIT=Yes docker compose up
      # or use a docker-compose.override.yml that sets DB_INIT: 'Yes'.
      DB_INIT: 'No'
      DB_USERNAME: 'postgres'
      DB_PASSWORD: 'postgres'
      DB_HOSTNAME: 'postgres'
      # Hammer.Redis-backed rate limiter. Shared across malan replicas
      # so login / reset / email-verify / session-extend limits aren't
      # per-pod (see SECURITY_REVIEW_02_CODEX.md).
      HAMMER_REDIS_URL: 'redis://redis:6379/0'
      LOG_LEVEL: 'debug'
    depends_on:
      - 'postgres'
      - 'redis'

volumes:
  pgdata:
  redisdata:

