---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: malan
    tier: web
    env: prod
    kind: deployment
  name: malan
  namespace: malan-prod
spec:
  replicas: 8
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: prod
  template:
    metadata:
      labels:
        app: malan
        tier: web
        env: prod
        kind: pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9568"
        prometheus.io/path: "/metrics"
      namespace: malan-prod
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - image: docker.io/freedomben/malan:${RELEASE_VERSION}
        name: malan
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          protocol: TCP
          name: http
        - containerPort: 9568
          protocol: TCP
          name: metrics
        readinessProbe:
          httpGet:
            path: /health_check/readiness
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 2
        envFrom:
          - configMapRef:
              name: malan-web-config
          - secretRef:
              name: malan-deploy-secrets
        securityContext:
          allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - malan
                    - key: tier
                      operator: In
                      values:
                        - web
                topologyKey: doks.digitalocean.com/node-id

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: malan-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: prod

---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: malan
    env: prod
    kind: configmap
  name: malan-web-config
  namespace: malan-prod
data:
  BIND_ADDR: '0.0.0.0'
  # Pool sized for Oban logs queue (10 workers) + request handlers per
  # pod. At 8 pods and max_connections=200 this leaves headroom for
  # other services. Bumped from 5 to 10 to reduce contention between
  # background log inserts and HTTP handlers.
  POOL_SIZE: '10'
  MAILGUN_DOMAIN: 'mg.accounts.ameelio.org'
  HOST: 'accounts.ameelio.org'
  PORT: '4000'
  EXTERNAL_HOST: 'accounts.ameelio.org'
  EXTERNAL_PORT: '443'
  EXTERNAL_SCHEME: 'https'
  DATABASE_TLS_ENABLED: 'true'
  MIN_PASSWORD_LENGTH: '8'
  ADMIN_SET_USER_MIN_PASSWORD_LENGTH: '6'
  ADMIN_ACCOUNT_MIN_PASSWORD_LENGTH: '12'
  MALAN_EMAIL_VERIFICATION_AUTO_SEND: 'false'
  SENTRY_ENVIRONMENT: 'prod'
  # Vars from secrets
  # DATABASE_URL
  # MAILGUN_API_KEY
  # SERET_KEY_BASE
  # SENTRY_DNS
  # HAMMER_REDIS_URL    # rediss://default:<password>@<host>:<port>/0 (DO Managed Redis)

# Service annotations for Digital Ocean
# https://docs.digitalocean.com/products/kubernetes/how-to/configure-load-balancers/

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: malan
    tier: web
    env: prod
    kind: service
  name: malan
  namespace: malan-prod
spec:
  type: ClusterIP
  selector:
    app: malan
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4000
