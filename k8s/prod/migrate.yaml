---
# Dedicated ServiceAccount with no role bindings. The app does not
# call the Kubernetes API, so the API-server token is never needed.
# Defined here (not in deploy.yaml) because CI applies migrate.yaml
# first; the migration Job references this SA and is rejected if it
# does not yet exist in the namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: malan
  namespace: malan-prod
  labels:
    app: malan
    tier: shared
    env: prod
    kind: serviceaccount
automountServiceAccountToken: false

---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: malan
    tier: migration
    env: prod
    kind: job
  name: malan-migration
  namespace: malan-prod
spec:
  template:
    metadata:
      labels:
        app: malan
        tier: migration
        env: prod
        kind: pod
    spec:
      serviceAccountName: malan
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: malan-migration
        image: docker.io/freedomben/malan:${RELEASE_VERSION}
        command: ["/app/bin/malan", "eval", "Malan.Release.create_and_migrate()"]
        env:
          - name: RELEASE_TMP
            value: /tmp
          - name: ERL_CRASH_DUMP
            value: /tmp/erl_crash.dump
        envFrom:
          - configMapRef:
              name: malan-migration-config
          - secretRef:
              name: malan-migration-secrets
        volumeMounts:
          - name: tmp
            mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: tmp
          emptyDir: {}
  ttlSecondsAfterFinished: 86400 # 24 hours
  parallelism: 1
  completions: 1
  backoffLimit: 2
