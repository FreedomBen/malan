---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: malan
    tier: migration
    env: prod
    kind: configmap
  name: malan-migration-config
  namespace: malan-prod
data:
  BIND_ADDR: '127.0.0.1'
  POOL_SIZE: '5'
  DB_POOL_SIZE: '5'

---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: malan-migration
    tier: migration
    env: prod
    kind: job
  name: malan-migration
  namespace: malan-prod
spec:
  template:
    spec:
      serviceAccountName: malan
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: malan-migration
        image: docker.io/freedomben/malan:${RELEASE_VERSION}
        command: ["/app/bin/malan", "eval", "Malan.Release.create_and_migrate()"]
        env:
          - name: RELEASE_TMP
            value: /tmp
          - name: ERL_CRASH_DUMP
            value: /tmp/erl_crash.dump
        envFrom:
          - configMapRef:
              name: malan-migration-config
          - secretRef:
              name: malan-migration-secrets
        volumeMounts:
          - name: tmp
            mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: tmp
          emptyDir: {}
  ttlSecondsAfterFinished: 86400 # 24 hours
  parallelism: 1
  completions: 1
  backoffLimit: 2
