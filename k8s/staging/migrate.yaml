---
# Dedicated ServiceAccount with no role bindings. The app does not
# call the Kubernetes API, so the API-server token is never needed.
# Defined here (not in deploy.yaml) because CI applies migrate.yaml
# first; the migration Job references this SA and is rejected if it
# does not yet exist in the namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: malan
  namespace: malan-staging
  labels:
    app: malan
    tier: shared
    env: staging
    kind: serviceaccount
automountServiceAccountToken: false

---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: malan
    tier: migration
    env: staging
    kind: job
  name: malan-migration
  namespace: malan-staging
spec:
  template:
    metadata:
      labels:
        app: malan
        tier: migration
        env: staging
        kind: pod
    spec:
      serviceAccountName: malan
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: malan-migration
        image: docker.io/freedomben/malan:${RELEASE_VERSION}
        # migrate() not create_and_migrate(): CloudNativePG's bootstrap already
        # creates malan_staging, and create_and_migrate's storage_up step opens a
        # connection to a maintenance database (template1) to run CREATE DATABASE,
        # which the rw pooler can't route. migrate() only touches malan_staging.
        command: ["/app/bin/malan", "eval", "Malan.Release.migrate()"]
        env:
          - name: RELEASE_TMP
            value: /tmp
          - name: ERL_CRASH_DUMP
            value: /tmp/erl_crash.dump
        envFrom:
          - configMapRef:
              name: malan-migration-config
          - secretRef:
              name: malan-migration-secrets
          # CloudNativePG MIGRATE contract secret — connects as the owner role
          # (malan_owner, DDL), last so its rw-pooler DATABASE_URL overrides the
          # legacy DBaaS one and supplies PGHOST/PGSSLROOTCERT for verify-full. The
          # web pods use malan-pg-secrets (malan_app, DML only); migrations need
          # DDL, so only this Job connects with the owner credentials.
          - secretRef:
              name: malan-pg-migrate-secrets
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          # CloudNativePG cluster CA, read-only at the PGSSLROOTCERT path.
          - name: malan-pg-ca
            mountPath: /etc/cnpg/malan-pg
            readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        # Project ONLY ca.crt from the CNPG-generated malan-pg-ca Secret (it also
        # holds the CA private key ca.key, which items: keeps out of the pod).
        - name: malan-pg-ca
          secret:
            secretName: malan-pg-ca
            items:
              - key: ca.crt
                path: ca.crt
  ttlSecondsAfterFinished: 86400 # 24 hours
  parallelism: 1
  completions: 1
  backoffLimit: 2
