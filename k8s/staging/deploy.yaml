---
# NOTE: The `malan` ServiceAccount is defined in migrate.yaml so it
# exists before the migration Job runs (CI applies migrate.yaml first).
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: deployment
    app.kubernetes.io/name: malan
    app.kubernetes.io/instance: malan-staging
    app.kubernetes.io/version: ${RELEASE_VERSION}
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: malan
    app.kubernetes.io/managed-by: kubectl
  name: malan
  namespace: malan-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: staging
  template:
    metadata:
      labels:
        app: malan
        tier: web
        env: staging
        kind: pod
        app.kubernetes.io/name: malan
        app.kubernetes.io/instance: malan-staging
        app.kubernetes.io/version: ${RELEASE_VERSION}
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: malan
        app.kubernetes.io/managed-by: kubectl
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9568"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: malan
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - image: docker.io/freedomben/malan:${RELEASE_VERSION}
        name: malan
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          protocol: TCP
          name: http
        - containerPort: 9568
          protocol: TCP
          name: metrics
        readinessProbe:
          httpGet:
            path: /health_check/readiness
            port: 4000
            # Without this, force_ssl 301-redirects the kubelet probe and
            # surfaces a Warning ProbeWarning event. force_ssl is configured
            # with `rewrite_on: [:x_forwarded_proto]`, so this header makes
            # Plug.SSL treat the request as already-HTTPS.
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health_check/liveness
            port: 4000
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 20
          failureThreshold: 3
        env:
          # The release image's root FS is read-only. Redirect Mix release
          # scratch space and the BEAM crash dump to the tmp emptyDir.
          - name: RELEASE_TMP
            value: /tmp
          - name: ERL_CRASH_DUMP
            value: /tmp/erl_crash.dump
        envFrom:
          - configMapRef:
              name: malan-web-config
          - secretRef:
              name: malan-deploy-secrets
          # CloudNativePG contract secret (Terraform-managed). Listed last so its
          # DATABASE_URL (the malan-pg rw pooler) overrides the legacy DBaaS one
          # in malan-deploy-secrets; it also supplies the PGHOST/PGSSLROOTCERT
          # that Malan.RepoConfig reads for verify-full.
          - secretRef:
              name: malan-pg-secrets
        resources:
          # Mirrors prod sizing (see k8s/prod/deploy.yaml). Pbkdf2 verify
          # is single-threaded HMAC-SHA512 (~1s on one core) and BEAM
          # schedules concurrent verifies one-per-scheduler, so a tight
          # CFS quota throttles login bursts into multi-second wall time.
          # - request 500m: enough kubelet-reserved share to keep BEAM
          #   responsive under typical load.
          # - limit 4: gives a single pod headroom to absorb a verify
          #   burst at single-verify wall time. Worker-pool nodes are
          #   4 vCPU, so a saturated pod can briefly use the whole node;
          #   acceptable here given staging's 2-replica footprint and
          #   anti-affinity keeps them on separate nodes.
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "4"
            memory: 1Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          # CloudNativePG cluster CA, read-only at the PGSSLROOTCERT path the
          # contract secret points at. Mounting a Secret volume is fine under
          # readOnlyRootFilesystem (the kubelet creates the mount point).
          - name: malan-pg-ca
            mountPath: /etc/cnpg/malan-pg
            readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        # Project ONLY ca.crt from the CNPG-generated malan-pg-ca Secret — it
        # also holds the CA private key (ca.key), which items: keeps out of the
        # pod.
        - name: malan-pg-ca
          secret:
            secretName: malan-pg-ca
            items:
              - key: ca.crt
                path: ca.crt
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - malan
                    - key: tier
                      operator: In
                      values:
                        - web
                topologyKey: doks.digitalocean.com/node-id

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: poddisruptionbudget
    app.kubernetes.io/name: malan
    app.kubernetes.io/instance: malan-staging
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: malan
    app.kubernetes.io/managed-by: kubectl
  name: malan-pdb
  namespace: malan-staging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: staging

# Service annotations for Digital Ocean
# https://docs.digitalocean.com/products/kubernetes/how-to/configure-load-balancers/

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: service
    app.kubernetes.io/name: malan
    app.kubernetes.io/instance: malan-staging
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: malan
    app.kubernetes.io/managed-by: kubectl
  name: malan
  namespace: malan-staging
spec:
  type: ClusterIP
  selector:
    app: malan
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4000

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: podmonitor
    app.kubernetes.io/name: malan
    app.kubernetes.io/instance: malan-staging
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: malan
    app.kubernetes.io/managed-by: kubectl
    # Required: kube-prometheus-stack's Prometheus selects PodMonitors by this
    # release label (podMonitorSelector). podMonitorNamespaceSelector is empty,
    # so a PodMonitor in this namespace is in scope.
    release: kube-prometheus-stack
  name: malan
  namespace: malan-staging
spec:
  selector:
    matchLabels:
      app: malan
      tier: web
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: http
  podTargetLabels:
    - app
    - tier
    - env
