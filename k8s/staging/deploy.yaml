---
# NOTE: The `malan` ServiceAccount is defined in migrate.yaml so it
# exists before the migration Job runs (CI applies migrate.yaml first).
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: deployment
  name: malan
  namespace: malan-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: staging
  template:
    metadata:
      labels:
        app: malan
        tier: web
        env: staging
        kind: pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9568"
        prometheus.io/path: "/metrics"
      namespace: malan-staging
    spec:
      serviceAccountName: malan
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - image: docker.io/freedomben/malan:${RELEASE_VERSION}
        name: malan
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          protocol: TCP
          name: http
        - containerPort: 9568
          protocol: TCP
          name: metrics
        readinessProbe:
          httpGet:
            path: /health_check/readiness
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health_check/liveness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 20
          failureThreshold: 3
        env:
          # The release image's root FS is read-only. Redirect Mix release
          # scratch space and the BEAM crash dump to the tmp emptyDir.
          - name: RELEASE_TMP
            value: /tmp
          - name: ERL_CRASH_DUMP
            value: /tmp/erl_crash.dump
        envFrom:
          - configMapRef:
              name: malan-web-config
          - secretRef:
              name: malan-deploy-secrets
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - malan
                    - key: tier
                      operator: In
                      values:
                        - web
                topologyKey: doks.digitalocean.com/node-id

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: malan-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: malan
#      tier: web
#      env: staging

---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: malan
    env: staging
    kind: configmap
  name: malan-web-config
  namespace: malan-staging
data:
  LOG_LEVEL: 'info'
  BIND_ADDR: '0.0.0.0'
  POOL_SIZE: '3'
  MAILGUN_DOMAIN: 'mg.accounts.ameelio.org'
  HOST: 'accounts.ameelio.xyz'
  PORT: '4000'
  EXTERNAL_HOST: 'accounts.ameelio.xyz'
  EXTERNAL_PORT: '443'
  EXTERNAL_SCHEME: 'https'
  DATABASE_TLS_ENABLED: 'true'
  MIN_PASSWORD_LENGTH: '8'
  ADMIN_SET_USER_MIN_PASSWORD_LENGTH: '6'
  ADMIN_ACCOUNT_MIN_PASSWORD_LENGTH: '12'
  MALAN_EMAIL_VERIFICATION_AUTO_SEND: 'false'
  SENTRY_ENVIRONMENT: 'staging'
  # Vars from secrets
  # DATABASE_URL
  # MAILGUN_API_KEY
  # SERET_KEY_BASE
  # SENTRY_DNS
  # HAMMER_REDIS_URL    # rediss://default:<password>@<host>:<port>/0 (DO Managed Redis)

# Service annotations for Digital Ocean
# https://docs.digitalocean.com/products/kubernetes/how-to/configure-load-balancers/

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: malan
    tier: web
    env: staging
    kind: service
  name: malan
  namespace: malan-staging
spec:
  type: ClusterIP
  selector:
    app: malan
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4000
